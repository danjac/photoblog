{% extends "error_base.html" %}
{% load i18n %}

{% block content %}
  <div class="py-12 text-center">
    <p class="text-base font-semibold text-primary">403</p>
    <h1 class="mt-2 text-4xl font-bold tracking-tight text-base-content">{% translate "Permission Denied" %}</h1>
    <p class="mt-4 text-lg text-base-content/60">{% translate "You do not have permission to access this page." %}</p>
    <div class="mt-8">
      <a href="{% url 'index' %}" class="btn btn-primary">{% translate "Go home" %}</a>
    </div>
  </div>
{% endblock content %}
