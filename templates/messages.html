{% load heroicons i18n %}<div id="messages" class="z-50 toast toast-end toast-bottom"{% if hx_oob %} hx-swap-oob="true"{% endif %}>
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-soft alert-{{ message.tags }}"
                 role="alert"
                 x-data="{show: true}"
                 x-show="show"
                 x-init="setTimeout(() => show = false, 4000)"
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="transform opacity-0 translate-y-2"
                 x-transition:enter-end="transform opacity-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-300"
                 x-transition:leave-start="transform opacity-100 translate-y-0"
                 x-transition:leave-end="transform opacity-0 translate-y-2">
                <span>{{ message.message }}</span>
                <button
                    type="button"
                    aria-label="{% translate "Dismiss" %}"
                    @click="show = false"
                    class="btn btn-ghost btn-xs btn-circle">
                    {% heroicon_mini "x-mark" class="size-4" aria_hidden="true" %}
                </button>
            </div>
        {% endfor %}
    {% endif %}
</div>
